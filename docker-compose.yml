version: "3.9"

services:
  backend:
    build: ./backend
    container_name: agri_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  frontend:
    build: ./frontend
    container_name: agri_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: always